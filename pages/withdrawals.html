<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retraits — Crushet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/data.js"></script>
  <script src="../js/admin-nav.js"></script>
  <script>
    checkAdminAuth();

    function process(id, status) {
      DB.updateWithdrawal(id, { status, processedAt: Date.now() });
      if (status === 'rejected') {
        const w = DB.getWithdrawals().find(x => x.id === id);
        if (w) {
          const a = DB.getAffiliate(w.affId);
          if (a) { a.balance = (a.balance||0) + w.amount; DB.saveAffiliate(w.affId, a); }
        }
      }
      render();
    }

    function render() {
      const withdrawals = DB.getWithdrawals();
      const affs = DB.getAffiliates();
      const pending = withdrawals.filter(w => w.status === 'pending');
      const methodLabel = { paypal:'PayPal', virement:'Virement', crypto:'Crypto' };

      const rowsHTML = withdrawals.length === 0
        ? `<tr><td colspan="6" class="td-empty">Aucune demande de retrait</td></tr>`
        : withdrawals.map(w => {
            const a = affs[w.affId];
            let details = '';
            if (w.method==='paypal') details = w.paypal||'—';
            else if (w.method==='virement') details = `${w.firstname} ${w.lastname} · ${w.iban||'—'}`;
            else if (w.method==='crypto') details = `${w.wallet||'—'} (${w.network||'—'})`;
            const [cls,label] = {pending:['badge-pending','En attente'],done:['badge-done','Traité'],rejected:['badge-rejected','Refusé']}[w.status]||['',''];
            return `<tr>
              <td><a href="affiliate-detail.html?id=${w.affId}" style="color:var(--accent-dark);text-decoration:none;font-weight:600">${a?a.name:'—'}</a></td>
              <td><strong>${w.amount.toFixed(2)} €</strong></td>
              <td>${methodLabel[w.method]||w.method}</td>
              <td style="font-size:.78rem;color:var(--text-muted);max-width:180px;word-break:break-all">${details}</td>
              <td><span class="badge-status ${cls}">${label}</span></td>
              <td>
                ${w.status==='pending'
                  ? `<button class="btn btn-green btn-sm" onclick="process('${w.id}','done')">Valider</button>
                     <button class="btn btn-red btn-sm" onclick="process('${w.id}','rejected')" style="margin-left:6px">Refuser</button>`
                  : '—'}
              </td>
            </tr>`;
          }).join('');

      renderShell('withdrawals', `
        <p class="page-title">Demandes de retrait</p>
        <p class="page-desc">${pending.length} demande(s) en attente de traitement</p>
        ${pending.length > 0 ? `<div class="alert-box">${pending.length} demande(s) nécessitent votre attention</div>` : ''}
        <div class="card">
          <div class="tbl-wrap">
            <table>
              <thead><tr><th>Affilié</th><th>Montant</th><th>Méthode</th><th>Détails</th><th>Statut</th><th>Action</th></tr></thead>
              <tbody>${rowsHTML}</tbody>
            </table>
          </div>
        </div>`);
    }

    window.addEventListener('DOMContentLoaded', () => { render(); setInterval(render, 5000); });
  </script>
</body>
</html>
