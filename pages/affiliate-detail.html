<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiche affilié — Crush Affi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/data.js"></script>
  <script src="../js/admin-nav.js"></script>
  <script>
    checkAdminAuth();
    const affId = new URLSearchParams(location.search).get('id');

    function getTrackUrl(slug) { return location.origin + '/' + slug; }
    function getAffUrl()       { return location.origin + '/pages/affiliate.html?id=' + affId; }

    function copy(id) {
      const el = document.getElementById(id);
      navigator.clipboard.writeText(el.value).then(() => {
        const btn = document.querySelector(`[data-for="${id}"]`);
        if (btn) { btn.textContent='Copié !'; setTimeout(()=>btn.textContent='Copier',2000); }
      });
    }

    async function generateLink() {
      const target = document.getElementById('link-target').value.trim();
      const rate   = parseFloat(document.getElementById('link-rate').value) || 5;
      if (!target) { document.getElementById('link-target').focus(); return; }

      const btn = document.querySelector('[onclick="generateLink()"]');
      btn.disabled = true; btn.textContent = 'Génération...';

      // Slug depuis le nom
      const aff  = await DB.getAffiliate(affId);
      const slug = aff.name.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]/g,'');

      // Supprime l'ancien lien
      const allLinks = await DB.getLinks();
      for (const [lid, l] of Object.entries(allLinks)) {
        if (l.affId === affId) await DB._delete('links', lid);
      }
      DB.invalidate('links');

      const linkId = DB.generateId();
      await DB.saveLink(linkId, { id:linkId, affId, target, rate, slug, clicks:0, createdAt:Date.now() });
      DB.invalidate('links');
      render();
    }

    async function deleteAffiliate() {
      if (!confirm('Supprimer cet affilié et toutes ses données ?')) return;
      await DB.deleteAffiliate(affId);
      const allLinks = await DB.getLinks();
      for (const [lid, l] of Object.entries(allLinks)) {
        if (l.affId === affId) await DB._delete('links', lid);
      }
      location.href = 'affiliates.html';
    }

    async function render() {
      const [aff, allLinks, clicks] = await Promise.all([
        DB.getAffiliate(affId),
        DB.getLinks(),
        DB.getClicksForAffiliate(affId),
      ]);

      if (!aff) { location.href = 'affiliates.html'; return; }

      const myLink = Object.entries(allLinks).find(([,l]) => l.affId === affId);
      const platforms = {iOS:0, Android:0, PC:0};
      clicks.forEach(c => { if(platforms[c.platform]!==undefined) platforms[c.platform]++; });
      const colors = {iOS:'#6366f1', Android:'#10b981', PC:'#f59e0b'};
      const rate = myLink ? (myLink[1].rate||5) : 5;
      const earnedRT = ((aff.clicks||0)/1000)*rate;

      const barsHTML = clicks.length === 0
        ? '<p style="color:var(--text-muted);font-size:.83rem">Aucun clic</p>'
        : Object.entries(platforms).map(([n,c]) => {
            const pct = Math.round((c/clicks.length)*100);
            return `<div class="platform-row"><span class="platform-name">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[n]}"></div></div><span class="platform-pct">${c} — ${pct}%</span></div>`;
          }).join('');

      const linkSection = `
        <div class="card" style="margin-bottom:18px">
          <div class="card-head"><span class="card-title">Liens de cet affilié</span></div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
            <div>
              <div style="font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Lien de connexion</div>
              <div class="copy-row">
                <input id="out-aff" value="${getAffUrl()}" readonly />
                <button class="btn btn-primary btn-sm" data-for="out-aff" onclick="copy('out-aff')">Copier</button>
              </div>
            </div>
            ${myLink ? `
            <div style="border-top:1px solid var(--border);padding-top:16px">
              <div style="font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Lien de tracking</div>
              <div class="copy-row">
                <input id="out-track" value="${getTrackUrl(myLink[1].slug || myLink[0])}" readonly />
                <button class="btn btn-primary btn-sm" data-for="out-track" onclick="copy('out-track')">Copier</button>
              </div>
            </div>` : `
            <div style="border-top:1px solid var(--border);padding-top:16px;color:var(--text-muted);font-size:.84rem">
              Pas encore de lien de tracking — génère-en un ci-dessous.
            </div>`}
          </div>
        </div>`;

      const genForm = `
        <div class="card">
          <div class="card-head"><span class="card-title">${myLink ? 'Regénérer le lien' : 'Générer un lien'}</span></div>
          <div class="card-body">
            <div class="form-row"><label>URL de destination</label>
              <input id="link-target" type="url" value="${myLink ? myLink[1].target : 'https://apps.apple.com/us/app/crush-assistant-drague/id6783893349'}" /></div>
            <div class="form-row"><label>Taux — € par 1 000 clics</label>
              <input id="link-rate" type="number" value="${myLink ? myLink[1].rate : 5}" min="1" /></div>
            <button class="btn btn-primary" onclick="generateLink()">${myLink ? 'Regénérer' : 'Générer le lien'}</button>
          </div>
        </div>`;

      renderShell('affiliates', `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
          <a href="affiliates.html" style="color:var(--text-muted);text-decoration:none;font-size:.82rem">Affiliés</a>
          <span style="color:var(--text-light)">/</span>
          <span style="font-size:.82rem">${aff.name}</span>
        </div>
        <p class="page-title">${aff.name}</p>
        <p class="page-desc">${aff.email} — Affilié depuis le ${DB.formatDate(aff.createdAt)}</p>
        <div class="stats-row" style="margin-bottom:20px">
          <div class="stat-box"><div class="stat-box-label">Clics totaux</div><div class="stat-box-value accent">${(aff.clicks||0).toLocaleString('fr-FR')}</div></div>
          <div class="stat-box"><div class="stat-box-label">Revenus (temps réel)</div><div class="stat-box-value green">${earnedRT.toFixed(2)} €</div></div>
          <div class="stat-box"><div class="stat-box-label">Taux</div><div class="stat-box-value">${rate} €/1k</div></div>
        </div>
        ${linkSection}
        ${genForm}
        <div class="card" style="margin-top:18px">
          <div class="card-head"><span class="card-title">Plateformes</span></div>
          <div class="card-body">${barsHTML}</div>
        </div>
        <div style="margin-top:24px">
          <button class="btn btn-red btn-sm" onclick="deleteAffiliate()">Supprimer cet affilié</button>
        </div>`);
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (!affId) { location.href = 'affiliates.html'; return; }
      render();
      setInterval(() => { DB.invalidate(); render(); }, 8000);
    });
  </script>
</body>
</html>
