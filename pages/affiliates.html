<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliés — AffiliTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/data.js"></script>
  <script src="../js/admin-nav.js"></script>
  <script>
    checkAdminAuth();

    function render() {
      const affs = DB.getAffiliates();
      const entries = Object.entries(affs);
      const links = DB.getLinks();

      const rowsHTML = entries.length === 0
        ? `<tr><td colspan="5" class="td-empty">Aucun affilié pour le moment — <a href="create.html">Créer le premier</a></td></tr>`
        : entries.map(([id, a]) => {
            const hasLink = Object.values(links).some(l => l.affId === id);
            return `<tr style="cursor:pointer" onclick="location.href='affiliate-detail.html?id=${id}'">
              <td><strong>${a.name}</strong></td>
              <td style="color:var(--text-muted)">${a.email}</td>
              <td>${(a.clicks||0).toLocaleString('fr-FR')}</td>
              <td><span class="balance-pill">${(a.balance||0).toFixed(2)} €</span></td>
              <td>${hasLink ? '<span style="color:var(--green);font-size:.78rem;font-weight:600">Lien actif</span>' : '<span style="color:var(--text-light);font-size:.78rem">Pas de lien</span>'}</td>
            </tr>`;
          }).join('');

      renderShell('affiliates', `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <p class="page-title">Affiliés</p>
          <a href="create.html" class="btn btn-primary btn-sm">+ Nouvel affilié</a>
        </div>
        <p class="page-desc">${entries.length} affilié(s) — cliquez sur une ligne pour ouvrir la fiche</p>
        <div class="card">
          <div class="tbl-wrap">
            <table>
              <thead><tr><th>Nom</th><th>Email</th><th>Clics</th><th>Solde</th><th>Lien</th></tr></thead>
              <tbody>${rowsHTML}</tbody>
            </table>
          </div>
        </div>`);
    }

    window.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
