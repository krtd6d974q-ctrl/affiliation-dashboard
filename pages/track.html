<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection...</title>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #0a0a0a; color: #fff; }
    .box { text-align: center; }
    .spinner { width: 48px; height: 48px; border: 4px solid #1e1e1e;
               border-top-color: #8afd3a; border-radius: 50%; animation: spin 0.8s linear infinite;
               margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand { font-size: 1.4rem; font-weight: 900; color: #8afd3a; letter-spacing: -1px; margin-bottom: 24px; }
    p { color: #666; font-size: .88rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">Crushet</div>
    <div class="spinner"></div>
    <p>Redirection en cours...</p>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/tracker.js"></script>
</body>
</html>
