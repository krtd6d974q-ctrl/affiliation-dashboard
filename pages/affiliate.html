<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon espace — Crushet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="login-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">Crushet</div>
      <h1>Mon espace</h1>
      <p class="auth-subtitle">Connecte-toi pour voir tes statistiques</p>
      <div class="field"><label>Email</label>
        <input type="email" id="f-email" placeholder="ton@email.com" onkeydown="if(event.key==='Enter')login()" />
      </div>
      <button class="btn-block" onclick="login()">Se connecter</button>
      <p id="err" class="auth-error hidden">Aucun compte trouvé avec cet email</p>
    </div>
  </div>

  <div id="app"></div>

  <script src="../js/data.js"></script>
  <script>
    const AFF_KEY = 'aff_session';
    let currentId = null;

    // Pré-remplir l'email depuis l'URL ?id=xxx
    window.addEventListener('DOMContentLoaded', () => {
      const urlId = new URLSearchParams(location.search).get('id');
      if (urlId) {
        const a = DB.getAffiliate(urlId);
        if (a) document.getElementById('f-email').value = a.email;
      }
      const saved = sessionStorage.getItem(AFF_KEY);
      if (saved && DB.getAffiliate(saved)) { currentId = saved; showDashboard(); }
    });

    function login() {
      const email = document.getElementById('f-email').value.trim();
      const found = Object.entries(DB.getAffiliates()).find(([,a]) => a.email === email);
      if (!found) { document.getElementById('err').classList.remove('hidden'); return; }
      currentId = found[0];
      sessionStorage.setItem(AFF_KEY, currentId);
      showDashboard();
    }

    function logout() { sessionStorage.removeItem(AFF_KEY); location.reload(); }

    function buildAffNav(activePage) {
      const pages = [
        { id:'stats',    label:'📊  Mes stats',   href:'#', group:'Suivi' },
        { id:'earnings', label:'💰  Revenus',      href:'#', group:'Suivi' },
        { id:'withdraw', label:'💸  Retrait',      href:'#', group:'Action' },
        { id:'payment',  label:'🏦  Paiement',     href:'#', group:'Action' },
      ];
      let lastG = '';
      const nav = pages.map(p => {
        let out = '';
        if (p.group !== lastG) { out += `<div class="nav-group">${p.group}</div>`; lastG = p.group; }
        out += `<a href="#" class="nav-link ${activePage===p.id?'active':''}" onclick="showPage('${p.id}');event.preventDefault()">${p.label}</a>`;
        return out;
      }).join('');
      const a = DB.getAffiliate(currentId);
      return `
        <header class="mob-header" id="mob-header">
          <span class="mob-brand">Crushet</span>
          <button class="mob-burger" id="burger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        </header>
        <div class="overlay" id="overlay" onclick="closeMenu()"></div>
        <div class="app">
          <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">Crushet <small>Espace affilié</small></div>
            <div class="sidebar-user">
              <div class="sidebar-user-name">${a.name}</div>
              <div class="sidebar-user-email">${a.email}</div>
            </div>
            <nav>${nav}</nav>
            <div class="sidebar-footer">
              <button class="btn-logout" onclick="logout()">Déconnexion</button>
            </div>
          </aside>
          <main class="main" id="page-content"></main>
        </div>`;
    }

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('burger').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }
    function closeMenu() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('burger').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    let currentPage = 'stats';
    let realtimeTimer = null;

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      showPage('stats');
    }

    function showPage(page) {
      currentPage = page;
      const a = DB.getAffiliate(currentId);
      document.getElementById('app').innerHTML = buildAffNav(page);
      if (page==='stats')    renderStats(a);
      if (page==='earnings') renderEarnings(a);
      if (page==='withdraw') renderWithdraw(a);
      if (page==='payment')  renderPayment(a);
      clearInterval(realtimeTimer);
      realtimeTimer = setInterval(() => {
        const fresh = DB.getAffiliate(currentId);
        if (currentPage==='stats')    renderStats(fresh);
        if (currentPage==='earnings') renderEarnings(fresh);
      }, 4000);
    }

    function setContent(html) {
      document.getElementById('page-content').innerHTML = html;
    }

    // ---- STATS ----
    function renderStats(a) {
      const clicks  = DB.getClicksForAffiliate(currentId);
      const total   = a.clicks || 0;
      const earned  = a.earned || 0;
      const balance = a.balance || 0;
      const rate    = getRate();
      const inCycle = total % 1000;
      const pct     = (inCycle/1000)*100;
      const next    = (Math.floor(total/1000)+1)*1000;
      const myLink  = Object.entries(DB.getLinks()).find(([,l]) => l.affId===currentId);
      const trackUrl = myLink ? location.origin + location.pathname.replace('pages/affiliate.html','') + 'pages/track.html?lid=' + myLink[0] : '';

      const platforms = {iOS:0, Android:0, PC:0};
      clicks.forEach(c => { if(platforms[c.platform]!==undefined) platforms[c.platform]++; });
      const colors = {iOS:'#6366f1', Android:'#10b981', PC:'#f59e0b'};
      const barsHTML = clicks.length===0
        ? '<p style="color:var(--text-muted);font-size:.83rem">Aucun clic enregistré</p>'
        : Object.entries(platforms).map(([n,c]) => {
            const p = Math.round((c/clicks.length)*100);
            return `<div class="platform-row"><span class="platform-name">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${colors[n]}"></div></div><span class="platform-pct">${c} — ${p}%</span></div>`;
          }).join('');

      const recentHTML = clicks.slice(0,10).map(c =>
        `<div class="activity-item"><span class="plat-tag plat-${c.platform.toLowerCase()}">${c.platform}</span><span class="activity-time">${DB.formatDate(c.ts)}</span></div>`
      ).join('') || '<p style="color:var(--text-muted);font-size:.83rem;padding:10px 0">Aucun clic</p>';

      setContent(`
        <span class="live-label"><span class="live-dot"></span>Temps réel</span>
        <p class="page-title">Mes statistiques</p>
        <p class="page-desc">Taux : ${rate} € par 1 000 clics</p>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-box-label">Total clics</div><div class="stat-box-value accent">${total.toLocaleString('fr-FR')}</div></div>
          <div class="stat-box"><div class="stat-box-label">Revenus gagnés</div><div class="stat-box-value green">${earned.toFixed(2)} €</div></div>
          <div class="stat-box"><div class="stat-box-label">Solde dispo</div><div class="stat-box-value">${balance.toFixed(2)} €</div></div>
        </div>

        ${trackUrl ? `
        <div class="card">
          <div class="card-head"><span class="card-title">Ton lien de tracking</span></div>
          <div class="card-body">
            <div class="copy-row">
              <input id="my-link" value="${trackUrl}" readonly />
              <button class="btn btn-secondary btn-sm" onclick="copyMyLink()">Copier</button>
            </div>
          </div>
        </div>` : '<div class="card"><div class="card-body" style="color:var(--text-muted);font-size:.85rem">Aucun lien actif — demande à ton admin de t\'en générer un.</div></div>'}

        <div class="card">
          <div class="card-head"><span class="card-title">Progression vers le prochain gain</span></div>
          <div class="card-body">
            <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
            <p class="progress-label">${inCycle.toLocaleString('fr-FR')} / 1 000 clics — prochain gain : +${rate} € au palier ${next.toLocaleString('fr-FR')}</p>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><span class="card-title">Plateformes</span></div>
          <div class="card-body">${barsHTML}</div>
        </div>

        <div class="card">
          <div class="card-head"><span class="card-title">Clics récents</span></div>
          <div class="card-body">${recentHTML}</div>
        </div>`);
    }

    function copyMyLink() {
      const val = document.getElementById('my-link').value;
      navigator.clipboard.writeText(val).then(() => {
        const btn = document.querySelector('#my-link + button');
        btn.textContent = 'Copié !'; setTimeout(()=>btn.textContent='Copier',2000);
      });
    }

    function getRate() {
      const l = Object.values(DB.getLinks()).find(l => l.affId===currentId);
      return l ? (l.rate||5) : 5;
    }

    // ---- EARNINGS ----
    function renderEarnings(a) {
      const earned = a.earned||0, balance = a.balance||0;
      const withdrawn = Math.max(0, earned - balance);
      const earnings = DB.getEarningsForAffiliate(currentId);
      const withdrawals = DB.getWithdrawalsForAffiliate(currentId);

      const earnRows = earnings.length===0
        ? '<p style="color:var(--text-muted);font-size:.83rem;padding:10px 0">Aucun gain encore — partagez votre lien pour commencer</p>'
        : earnings.map(e => `<div class="activity-item"><span class="balance-pill">+${e.amount.toFixed(2)} €</span><span>Palier ${e.clicks.toLocaleString('fr-FR')} clics</span><span class="activity-time">${DB.formatDate(e.ts)}</span></div>`).join('');

      const wRows = withdrawals.length===0
        ? '<p style="color:var(--text-muted);font-size:.83rem;padding:10px 0">Aucun retrait</p>'
        : withdrawals.map(w => {
            const [cls,lbl] = {pending:['badge-pending','En attente'],done:['badge-done','Traité'],rejected:['badge-rejected','Refusé']}[w.status]||['',''];
            return `<div class="activity-item"><span style="color:var(--red);font-weight:700;font-size:.82rem">-${w.amount.toFixed(2)} €</span><span>{{paypal:'PayPal',virement:'Virement',crypto:'Crypto'}[w.method]||w.method}</span><span class="badge-status ${cls}">${lbl}</span><span class="activity-time">${DB.formatDate(w.ts)}</span></div>`;
          }).join('');

      setContent(`
        <p class="page-title">Mes revenus</p>
        <p class="page-desc">Taux : ${getRate()} € par 1 000 clics</p>
        <div class="card">
          <div class="card-body">
            <div style="display:flex;flex-direction:column;gap:0">
              <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:.9rem"><span style="color:var(--text-muted)">Revenus totaux générés</span><strong>${earned.toFixed(2)} €</strong></div>
              <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:.9rem"><span style="color:var(--text-muted)">Déjà retiré</span><strong>${withdrawn.toFixed(2)} €</strong></div>
              <div style="display:flex;justify-content:space-between;padding:12px 0;font-size:1rem"><span style="color:var(--accent-dark);font-weight:600">Solde disponible</span><strong style="color:var(--accent-dark)">${balance.toFixed(2)} €</strong></div>
            </div>
          </div>
        </div>
        <div class="card"><div class="card-head"><span class="card-title">Historique des gains</span></div><div class="card-body">${earnRows}</div></div>
        <div class="card"><div class="card-head"><span class="card-title">Historique des retraits</span></div><div class="card-body">${wRows}</div></div>`);
    }

    // ---- WITHDRAW ----
    function renderWithdraw(a) {
      const balance = a.balance||0;
      const pay = a.paymentInfo||{};
      setContent(`
        <p class="page-title">Demande de retrait</p>
        <p class="page-desc">Solde disponible : <strong>${balance.toFixed(2)} €</strong></p>
        <div id="withdraw-form">
          <div class="form-card">
            <div class="form-section">Montant</div>
            <div class="form-row"><label>Montant à retirer (€)</label><input id="w-amount" type="number" min="1" step="0.01" placeholder="Ex : 25" /></div>
            <div class="form-section">Méthode</div>
            <div class="form-row"><label>Méthode de paiement</label>
              <select id="w-method" onchange="updateMethodInfo()">
                <option value="">-- Choisir --</option>
                <option value="paypal">PayPal</option>
                <option value="virement">Virement bancaire</option>
                <option value="crypto">Crypto</option>
              </select>
            </div>
            <div id="method-info" style="margin-bottom:14px"></div>
            <button class="btn btn-primary" onclick="submitWithdraw()">Envoyer la demande</button>
          </div>
        </div>
        <div id="withdraw-ok" style="display:none" class="success-box">
          <h3>Demande envoyée ✓</h3>
          <p>L'admin a été notifié et traitera ton retrait rapidement.</p>
          <button class="btn btn-secondary" style="margin-top:12px" onclick="showPage('stats')">Retour aux stats</button>
        </div>`);
    }

    function updateMethodInfo() {
      const method = document.getElementById('w-method').value;
      const a = DB.getAffiliate(currentId);
      const pay = a.paymentInfo||{};
      const el = document.getElementById('method-info');
      if (!method) { el.innerHTML=''; return; }
      const configured = { paypal: pay.paypal, virement: pay.iban, crypto: pay.wallet };
      if (configured[method]) {
        const txt = method==='paypal' ? pay.paypal
          : method==='virement' ? `${pay.firstname} ${pay.lastname} — ${pay.iban}`
          : `${pay.wallet} (${pay.cryptoNetwork})`;
        el.innerHTML = `<p style="font-size:.82rem;padding:10px 12px;background:var(--green-light);border-radius:var(--radius-sm);color:var(--green)">Vers : <strong>${txt}</strong></p>`;
      } else {
        el.innerHTML = `<p style="font-size:.82rem;padding:10px 12px;background:var(--yellow-light);border-radius:var(--radius-sm);color:var(--yellow)">Aucune info configurée — <a href="#" onclick="showPage('payment');event.preventDefault()" style="color:var(--yellow);font-weight:700">Configurer maintenant</a></p>`;
      }
    }

    function submitWithdraw() {
      const amount = parseFloat(document.getElementById('w-amount').value);
      const method = document.getElementById('w-method').value;
      const a = DB.getAffiliate(currentId);
      if (!amount||amount<=0) { alert('Montant invalide'); return; }
      if (!method) { alert('Choisissez une méthode'); return; }
      if (amount > (a.balance||0)) { alert(`Solde insuffisant (${(a.balance||0).toFixed(2)} €)`); return; }
      const pay = a.paymentInfo||{};
      DB.addWithdrawal({ id:DB.generateId(), affId:currentId, amount, method, status:'pending',
        ts:Date.now(), paypal:pay.paypal||'', firstname:pay.firstname||'', lastname:pay.lastname||'',
        iban:pay.iban||'', wallet:pay.wallet||'', network:pay.cryptoNetwork||'' });
      a.balance = (a.balance||0) - amount;
      DB.saveAffiliate(currentId, a);
      document.getElementById('withdraw-form').style.display = 'none';
      document.getElementById('withdraw-ok').style.display = 'block';
    }

    // ---- PAYMENT ----
    function renderPayment(a) {
      const p = a.paymentInfo||{};
      setContent(`
        <p class="page-title">Informations de paiement</p>
        <p class="page-desc">Configure tes coordonnées pour les retraits</p>
        <div class="form-card">
          <div class="form-section">PayPal</div>
          <div class="form-row"><label>Adresse PayPal</label><input id="p-paypal" type="email" placeholder="vous@paypal.com" value="${p.paypal||''}" /></div>
          <div class="form-section">Virement bancaire</div>
          <div class="form-row"><label>Prénom</label><input id="p-firstname" type="text" placeholder="Prénom" value="${p.firstname||''}" /></div>
          <div class="form-row"><label>Nom</label><input id="p-lastname" type="text" placeholder="Nom" value="${p.lastname||''}" /></div>
          <div class="form-row"><label>IBAN</label><input id="p-iban" type="text" placeholder="FR76 …" value="${p.iban||''}" /></div>
          <div class="form-section">Crypto</div>
          <div class="form-row"><label>Adresse wallet</label><input id="p-wallet" type="text" placeholder="0x…" value="${p.wallet||''}" /></div>
          <div class="form-row"><label>Réseau</label><input id="p-network" type="text" placeholder="Ethereum ERC-20" value="${p.cryptoNetwork||''}" /></div>
          <div style="display:flex;gap:10px;margin-top:6px">
            <button class="btn btn-primary" onclick="savePayment()">Enregistrer</button>
          </div>
          <p id="pay-ok" style="color:var(--green);font-size:.8rem;margin-top:10px;display:none">Enregistré</p>
        </div>`);
    }

    function savePayment() {
      const a = DB.getAffiliate(currentId);
      a.paymentInfo = {
        paypal: document.getElementById('p-paypal').value.trim(),
        firstname: document.getElementById('p-firstname').value.trim(),
        lastname: document.getElementById('p-lastname').value.trim(),
        iban: document.getElementById('p-iban').value.trim(),
        wallet: document.getElementById('p-wallet').value.trim(),
        cryptoNetwork: document.getElementById('p-network').value.trim(),
      };
      DB.saveAffiliate(currentId, a);
      document.getElementById('pay-ok').style.display = 'block';
      setTimeout(() => document.getElementById('pay-ok').style.display='none', 3000);
    }
  </script>
</body>
</html>
