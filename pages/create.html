<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un affilié — AffiliTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/data.js"></script>
  <script src="../js/admin-nav.js"></script>
  <script>
    checkAdminAuth();

    function createAffiliate() {
      const name  = document.getElementById('f-name').value.trim();
      const email = document.getElementById('f-email').value.trim();
      const pass  = document.getElementById('f-pass').value.trim();

      document.querySelectorAll('.field-err').forEach(e=>e.remove());
      let err = false;
      if (!name)  { addErr('f-name','Requis');  err=true; }
      if (!email) { addErr('f-email','Requis'); err=true; }
      if (!pass)  { addErr('f-pass','Requis');  err=true; }
      if (err) return;

      // Vérifie email unique
      const existing = Object.values(DB.getAffiliates()).find(a => a.email === email);
      if (existing) { addErr('f-email','Cet email est déjà utilisé'); return; }

      const id = DB.generateId();
      DB.saveAffiliate(id, { id, name, email, password: pass,
        clicks:0, earned:0, balance:0, createdAt: Date.now() });

      // Redirige vers la fiche de l'affilié
      location.href = 'affiliate-detail.html?id=' + id;
    }

    function addErr(fieldId, msg) {
      const el = document.getElementById(fieldId);
      const p = document.createElement('p');
      p.className = 'field-err'; p.textContent = msg;
      el.insertAdjacentElement('afterend', p);
    }

    renderShell('create', `
      <p class="page-title">Créer un affilié</p>
      <p class="page-desc">Remplissez les informations — vous pourrez ensuite générer son lien depuis sa fiche</p>
      <div class="form-card">
        <div class="form-section">Informations</div>
        <div class="form-row"><label>Nom complet</label><input id="f-name" type="text" placeholder="Jean Dupont" /></div>
        <div class="form-row"><label>Email (utilisé pour se connecter)</label><input id="f-email" type="email" placeholder="jean@exemple.com" /></div>
        <div class="form-row"><label>Mot de passe</label><input id="f-pass" type="text" placeholder="Choisir un mot de passe" /></div>
        <div style="margin-top:20px;display:flex;gap:10px">
          <button class="btn btn-primary" onclick="createAffiliate()">Créer l'affilié</button>
          <a href="affiliates.html" class="btn btn-secondary">Annuler</a>
        </div>
      </div>`);
  </script>
</body>
</html>
