<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un affilié — Crush Affi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/data.js"></script>
  <script src="../js/admin-nav.js"></script>
  <script>
    checkAdminAuth();

    window.addEventListener('DOMContentLoaded', () => {
      renderShell('create', `
        <p class="page-title">Créer un affilié</p>
        <p class="page-desc">Remplissez les informations — vous pourrez ensuite générer son lien depuis sa fiche</p>
        <div class="form-card">
          <div class="form-section">Informations</div>
          <div class="form-row"><label>Nom complet</label><input id="f-name" type="text" placeholder="Jean Dupont" /></div>
          <div class="form-row"><label>Email</label><input id="f-email" type="email" placeholder="jean@exemple.com" onkeydown="if(event.key==='Enter')createAffiliate()" /></div>
          <div style="margin-top:20px;display:flex;gap:10px">
            <button class="btn btn-primary" id="create-btn" onclick="createAffiliate()">Créer l'affilié</button>
            <a href="affiliates.html" class="btn btn-secondary">Annuler</a>
          </div>
          <p id="create-err" style="color:var(--red);font-size:.82rem;margin-top:10px;display:none"></p>
        </div>`, 0);
    });

    async function createAffiliate() {
      const name  = document.getElementById('f-name').value.trim();
      const email = document.getElementById('f-email').value.trim();
      const errEl = document.getElementById('create-err');
      const btn   = document.getElementById('create-btn');

      errEl.style.display = 'none';
      if (!name)  { errEl.textContent = 'Le nom est requis';   errEl.style.display='block'; return; }
      if (!email) { errEl.textContent = 'L\'email est requis'; errEl.style.display='block'; return; }

      btn.disabled = true;
      btn.textContent = 'Création...';

      try {
        const affs = await DB.getAffiliates();
        const existing = Object.values(affs).find(a => a.email.toLowerCase() === email.toLowerCase());
        if (existing) {
          errEl.textContent = 'Cet email est déjà utilisé';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Créer l\'affilié';
          return;
        }

        const id = DB.generateId();
        await DB.saveAffiliate(id, {
          id, name, email,
          clicks: 0, earned: 0, balance: 0,
          createdAt: Date.now()
        });

        location.href = 'affiliate-detail.html?id=' + id;
      } catch(e) {
        console.error(e);
        errEl.textContent = 'Erreur lors de la création. Réessaie.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Créer l\'affilié';
      }
    }
  </script>
</body>
</html>
