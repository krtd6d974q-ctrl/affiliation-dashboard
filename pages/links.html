<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liens — Crush Affi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/data.js"></script>
  <script src="../js/admin-nav.js"></script>
  <script>
    checkAdminAuth();

    function trackUrl(id, slug) { return location.origin + '/' + (slug || id); }

    function copyLink(id, slug) {
      navigator.clipboard.writeText(trackUrl(id, slug)).then(() => {
        const btn = document.getElementById('cpbtn-'+id);
        btn.textContent = 'Copié !';
        setTimeout(() => btn.textContent = 'Copier', 2000);
      });
    }

    async function render() {
      const [links, affs] = await Promise.all([DB.getLinks(), DB.getAffiliates()]);
      const entries = Object.entries(links);

      const rowsHTML = entries.length === 0
        ? `<tr><td colspan="6" class="td-empty">Aucun lien — <a href="create.html">Créer un affilié</a> pour en générer un</td></tr>`
        : entries.map(([id, l]) => {
            const a = affs[l.affId];
            const slug = l.slug || id;
            return `<tr>
              <td><a href="affiliate-detail.html?id=${l.affId}" style="color:var(--accent-dark);text-decoration:none;font-weight:600">${a?a.name:'Inconnu'}</a></td>
              <td><code style="font-size:.78rem">/${slug}</code></td>
              <td>${(l.clicks||0).toLocaleString('fr-FR')}</td>
              <td>${DB.computeEarned(l.clicks||0, l.rate).toFixed(2)} €</td>
              <td>${DB.formatDate(l.createdAt)}</td>
              <td><button id="cpbtn-${id}" class="btn btn-secondary btn-sm" onclick="copyLink('${id}','${slug}')">Copier</button></td>
            </tr>`;
          }).join('');

      renderShell('links', `
        <p class="page-title">Liens de tracking</p>
        <p class="page-desc">${entries.length} lien(s) actif(s)</p>
        <div class="card">
          <div class="tbl-wrap">
            <table>
              <thead><tr><th>Affilié</th><th>Lien</th><th>Clics</th><th>Revenus</th><th>Créé le</th><th></th></tr></thead>
              <tbody>${rowsHTML}</tbody>
            </table>
          </div>
        </div>`);
    }

    window.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
