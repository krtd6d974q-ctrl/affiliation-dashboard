<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection...</title>
  <style>body{margin:0;background:#0a0a0a}</style>
</head>
<body>
  <script src="/js/data.js"></script>
  <script>
    (async function () {
      const slug = new URLSearchParams(location.search).get('s') || '';
      const FALLBACK = 'https://apps.apple.com/us/app/crush-assistant-drague/id6783893349';

      const links = await DB.getLinks();
      const entry = Object.entries(links).find(([,l]) => l.slug === slug.toLowerCase());

      if (!entry) { location.replace(FALLBACK); return; }

      const [linkId, link] = entry;

      const click = {
        id:       DB.generateId(),
        linkId,
        affId:    link.affId,
        platform: DB.detectPlatform(),
        ts:       Date.now(),
        ua:       navigator.userAgent.substring(0, 100),
      };
      await DB.addClick(click);

      link.clicks = (link.clicks || 0) + 1;
      await DB.saveLink(linkId, link);

      const aff = await DB.getAffiliate(link.affId);
      if (aff) {
        aff.clicks = (aff.clicks || 0) + 1;
        await DB.saveAffiliate(link.affId, aff);
      }

      location.replace(link.target || FALLBACK);
    })();
  </script>
</body>
</html>
