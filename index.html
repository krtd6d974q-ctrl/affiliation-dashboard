<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crush Affi — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Login page overrides ── */
    body { background: #0a0a0a; }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(138,253,58,.18) 0%, transparent 60%),
        #0a0a0a;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
      animation: cardIn .4s cubic-bezier(.4,0,.2,1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .login-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .brand-logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: #000;
      letter-spacing: -1px;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 1.2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -.5px;
      line-height: 1;
    }
    .brand-sub {
      font-size: .68rem;
      color: #444;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 3px;
    }

    /* Heading */
    .login-heading {
      font-size: 1.55rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -.5px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: .84rem;
      color: #444;
      margin-bottom: 32px;
    }

    /* Field */
    .lf { margin-bottom: 18px; }
    .lf label {
      display: block;
      font-size: .7rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .lf-input-wrap { position: relative; }
    .lf input[type="password"],
    .lf input[type="text"] {
      width: 100%;
      padding: 13px 48px 13px 16px;
      background: #0a0a0a;
      border: 1.5px solid #222;
      border-radius: 12px;
      color: #fff;
      font-size: .95rem;
      font-family: inherit;
      transition: border .15s, box-shadow .15s;
      caret-color: var(--accent);
    }
    .lf input::placeholder { color: #333; }
    .lf input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138,253,58,.12);
    }
    .lf input.err-input { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.1); }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #444;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .eye-btn:hover { color: #888; }

    /* Remember */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .remember-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border: 1.5px solid #2a2a2a;
      border-radius: 5px;
      background: #0a0a0a;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color .15s, background .15s;
    }
    .remember-row input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .remember-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 9px;
      border: 2px solid #000;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .remember-row label {
      font-size: .84rem;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: .95rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -.2px;
      transition: background .15s, transform .1s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(138,253,58,.3);
    }
    .btn-login:active { transform: translateY(0); box-shadow: none; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Error */
    .login-err {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px;
      padding: 11px 14px;
      margin-top: 14px;
      font-size: .83rem;
      color: #f87171;
      font-weight: 600;
      animation: shake .35s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }

    /* Divider */
    .login-divider {
      margin: 28px 0 0;
      text-align: center;
      font-size: .71rem;
      color: #2a2a2a;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>

  <div class="login-wrap" id="login-wrap">
    <div class="login-card">

      <div class="login-brand">
        <div class="brand-logo">CA</div>
        <div>
          <div class="brand-name">Crush Affi</div>
          <div class="brand-sub">Administration</div>
        </div>
      </div>

      <h1 class="login-heading">Connexion</h1>
      <p class="login-sub">Accès réservé à l'administrateur</p>

      <div class="lf">
        <label for="pwd">Mot de passe</label>
        <div class="lf-input-wrap">
          <input type="password" id="pwd" placeholder="••••••••"
                 autocomplete="current-password"
                 onkeydown="if(event.key==='Enter')login()" />
          <button class="eye-btn" type="button" onclick="toggleEye()" id="eye-btn"
                  aria-label="Afficher / masquer le mot de passe">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember" checked />
        <label for="remember">Rester connecté</label>
      </div>

      <button class="btn-login" id="login-btn" onclick="login()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Se connecter
      </button>

      <div id="err-box" style="display:none" class="login-err">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Mot de passe incorrect
      </div>

      <p class="login-divider">Crush Affi © 2025</p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/admin-nav.js"></script>
  <script>
    // ── Eye toggle ──
    function toggleEye() {
      const inp = document.getElementById('pwd');
      const icon = document.getElementById('eye-icon');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      icon.innerHTML = show
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    }

    // ── Login ──
    function login() {
      const pwd = document.getElementById('pwd').value;
      const remember = document.getElementById('remember').checked;
      const btn = document.getElementById('login-btn');
      const errBox = document.getElementById('err-box');
      const pwdInp = document.getElementById('pwd');

      btn.disabled = true;

      if (pwd === DB.getAdminPassword()) {
        // Persistance selon la case "rester connecté"
        if (remember) {
          localStorage.setItem(ADMIN_SESSION, '1');
        } else {
          sessionStorage.setItem(ADMIN_SESSION, '1');
        }
        showPage();
      } else {
        errBox.style.display = 'flex';
        pwdInp.classList.add('err-input');
        btn.disabled = false;
        // Reset animation
        errBox.style.animation = 'none';
        void errBox.offsetWidth;
        errBox.style.animation = '';
        // Enlever le highlight après 2s
        setTimeout(() => pwdInp.classList.remove('err-input'), 2000);
      }
    }

    // ── Dashboard ──
    function showPage() {
      const clicks = DB.getClicks();
      const affs   = DB.getAffiliates();
      const links  = DB.getLinks();
      const total  = Object.values(affs).reduce((s, a) => s + (a.earned || 0), 0);

      const platforms = { iOS: 0, Android: 0, PC: 0 };
      clicks.forEach(c => { if (platforms[c.platform] !== undefined) platforms[c.platform]++; });
      const colors = { iOS: '#6366f1', Android: '#10b981', PC: '#f59e0b' };

      const barsHTML = clicks.length === 0
        ? '<p style="color:var(--text-muted);font-size:.83rem">Aucun clic enregistré</p>'
        : Object.entries(platforms).map(([n, c]) => {
            const pct = Math.round((c / clicks.length) * 100);
            return `<div class="platform-row"><span class="platform-name">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[n]}"></div></div><span class="platform-pct">${c} — ${pct}%</span></div>`;
          }).join('');

      const recentHTML = clicks.slice(0, 8).map(c => {
        const a = DB.getAffiliate(c.affId);
        return `<div class="activity-item"><span class="plat-tag plat-${c.platform.toLowerCase()}">${c.platform}</span><span>${a ? a.name : '—'}</span><span class="activity-time">${DB.formatDate(c.ts)}</span></div>`;
      }).join('') || '<p style="color:var(--text-muted);font-size:.83rem;padding:12px 0">Aucune activité</p>';

      renderShell('overview', `
        <p class="page-title">Vue globale</p>
        <p class="page-desc">Temps réel — rafraîchissement automatique</p>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-box-label">Clics totaux</div><div class="stat-box-value accent">${clicks.length.toLocaleString('fr-FR')}</div></div>
          <div class="stat-box"><div class="stat-box-label">Revenus générés</div><div class="stat-box-value green">${total.toFixed(2)} €</div></div>
          <div class="stat-box"><div class="stat-box-label">Affiliés</div><div class="stat-box-value">${Object.keys(affs).length}</div></div>
          <div class="stat-box"><div class="stat-box-label">Liens actifs</div><div class="stat-box-value">${Object.keys(links).length}</div></div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Plateformes</span></div>
          <div class="card-body">${barsHTML}</div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Activité récente</span></div>
          <div class="card-body">${recentHTML}</div>
        </div>`);

      setTimeout(showPage, 6000);
    }

    // ── Auto-login si session active (localStorage OU sessionStorage) ──
    window.addEventListener('DOMContentLoaded', () => {
      if (
        localStorage.getItem(ADMIN_SESSION) === '1' ||
        sessionStorage.getItem(ADMIN_SESSION) === '1'
      ) {
        showPage();
      }
    });
  </script>
</body>
</html>
