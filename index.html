<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crushet — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="login-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">Crushet</div>
      <h1>Connexion Admin</h1>
      <p class="auth-subtitle">Accès réservé à l'administrateur</p>
      <div class="field"><label>Mot de passe</label>
        <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
      </div>
      <button class="btn-block" onclick="login()">Se connecter</button>
      <p id="err" class="auth-error hidden">Mot de passe incorrect</p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/admin-nav.js"></script>
  <script>
    function login() {
      if (document.getElementById('pwd').value === DB.getAdminPassword()) {
        sessionStorage.setItem(ADMIN_SESSION, '1');
        showPage();
      } else {
        document.getElementById('err').classList.remove('hidden');
      }
    }

    function showPage() {
      document.getElementById('login-screen').style.display = 'none';
      const clicks = DB.getClicks();
      const affs   = DB.getAffiliates();
      const links  = DB.getLinks();
      const total  = Object.values(affs).reduce((s,a) => s+(a.earned||0), 0);
      const platforms = {iOS:0, Android:0, PC:0};
      clicks.forEach(c => { if (platforms[c.platform]!==undefined) platforms[c.platform]++; });
      const colors = {iOS:'#6366f1', Android:'#10b981', PC:'#f59e0b'};
      const barsHTML = clicks.length === 0
        ? '<p style="color:var(--text-muted);font-size:.83rem">Aucun clic enregistré</p>'
        : Object.entries(platforms).map(([n,c]) => {
            const pct = Math.round((c/clicks.length)*100);
            return `<div class="platform-row"><span class="platform-name">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[n]}"></div></div><span class="platform-pct">${c} — ${pct}%</span></div>`;
          }).join('');

      const recentHTML = clicks.slice(0,8).map(c => {
        const a = DB.getAffiliate(c.affId);
        return `<div class="activity-item"><span class="plat-tag plat-${c.platform.toLowerCase()}">${c.platform}</span><span>${a?a.name:'—'}</span><span class="activity-time">${DB.formatDate(c.ts)}</span></div>`;
      }).join('') || '<p style="color:var(--text-muted);font-size:.83rem;padding:12px 0">Aucune activité</p>';

      renderShell('overview', `
        <p class="page-title">Vue globale</p>
        <p class="page-desc">Temps réel — rafraîchissement automatique</p>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-box-label">Clics totaux</div><div class="stat-box-value accent">${clicks.length.toLocaleString('fr-FR')}</div></div>
          <div class="stat-box"><div class="stat-box-label">Revenus générés</div><div class="stat-box-value green">${total.toFixed(2)} €</div></div>
          <div class="stat-box"><div class="stat-box-label">Affiliés</div><div class="stat-box-value">${Object.keys(affs).length}</div></div>
          <div class="stat-box"><div class="stat-box-label">Liens actifs</div><div class="stat-box-value">${Object.keys(links).length}</div></div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Plateformes</span></div>
          <div class="card-body">${barsHTML}</div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Activité récente</span></div>
          <div class="card-body">${recentHTML}</div>
        </div>`);

      setTimeout(showPage, 6000);
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem(ADMIN_SESSION) === '1') showPage();
    });
  </script>
</body>
</html>
