<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AffiliTrack — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">AffiliTrack</div>
      <h1>Espace Admin</h1>
      <p class="subtitle">Accès réservé à l'administrateur</p>
      <input type="password" id="admin-password" placeholder="Mot de passe" />
      <button onclick="adminLogin()">Connexion</button>
      <p id="login-error" class="error hidden">Mot de passe incorrect</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="app" class="hidden"></div>

  <script src="js/data.js"></script>
  <script src="js/admin-nav.js"></script>
  <script>
    function adminLogin() {
      const pass = document.getElementById('admin-password').value;
      if (pass === DB.getAdminPassword()) {
        sessionStorage.setItem(ADMIN_SESSION, '1');
        showDashboard();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
      }
    }

    function showDashboard() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadDemoData();
      renderPage();
    }

    function loadDemoData() {
      if (DB.get('demo_loaded')) return;
      const a1 = 'demo_aff_001', a2 = 'demo_aff_002';
      const l1 = 'demo_link_001', l2 = 'demo_link_002';
      DB.saveAffiliate(a1, { id:a1, name:'Marie Dupont', email:'marie@exemple.com', password:'marie123', clicks:2340, earned:10, balance:10, createdAt: Date.now()-86400000*5 });
      DB.saveAffiliate(a2, { id:a2, name:'Lucas Martin', email:'lucas@exemple.com', password:'lucas123', clicks:870, earned:0, balance:0, createdAt: Date.now()-86400000*2 });
      DB.saveLink(l1, { id:l1, affId:a1, target:'https://monapp.com', rate:5, clicks:2340, createdAt: Date.now()-86400000*5 });
      DB.saveLink(l2, { id:l2, affId:a2, target:'https://monapp.com', rate:5, clicks:870, createdAt: Date.now()-86400000*2 });
      ['iOS','Android','PC'].forEach((p,pi) => {
        for(let i=0;i<10;i++) DB.addClick({ id:DB.generateId(), linkId:pi<2?l1:l2, affId:pi<2?a1:a2, platform:p, ts:Date.now()-Math.random()*3600000 });
      });
      DB.addEarning({ id:DB.generateId(), affId:a1, linkId:l1, amount:5, clicks:1000, ts:Date.now()-86400000*3 });
      DB.addEarning({ id:DB.generateId(), affId:a1, linkId:l1, amount:5, clicks:2000, ts:Date.now()-86400000 });
      DB.set('demo_loaded', true);
    }

    function renderPage() {
      const clicks = DB.getClicks();
      const affiliates = DB.getAffiliates();
      const links = DB.getLinks();
      const totalClicks = clicks.length;
      const totalRevenue = Object.values(affiliates).reduce((s,a) => s+(a.earned||0), 0);
      const totalAff = Object.keys(affiliates).length;
      const totalLinks = Object.keys(links).length;

      const platforms = { iOS:0, Android:0, PC:0 };
      clicks.forEach(c => { if(platforms[c.platform]!==undefined) platforms[c.platform]++; });
      const colors = { iOS:'#6366f1', Android:'#10b981', PC:'#f59e0b' };
      const barsHTML = totalClicks === 0
        ? '<p class="empty">Aucun clic enregistré</p>'
        : Object.entries(platforms).map(([n,c]) => {
            const pct = Math.round((c/totalClicks)*100);
            return `<div class="platform-row"><span class="platform-label">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[n]}"></div></div><span class="platform-count">${c} (${pct}%)</span></div>`;
          }).join('');

      const recentHTML = clicks.slice(0,10).map(c => {
        const aff = DB.getAffiliate(c.affId);
        return `<div class="activity-item"><span class="platform-tag platform-${c.platform.toLowerCase()}">${c.platform}</span><span>${aff?aff.name:'Inconnu'}</span><span class="activity-time">${DB.formatDate(c.ts)}</span></div>`;
      }).join('') || '<p class="empty">Aucune activité récente</p>';

      const content = `
        <div class="page-header"><h2>Vue globale</h2><p>Suivi en temps réel</p></div>
        <div class="stats-grid">
          <div class="stat-card accent"><div class="stat-label">Clics totaux</div><div class="stat-value">${totalClicks.toLocaleString('fr-FR')}</div></div>
          <div class="stat-card green"><div class="stat-label">Revenus distribués</div><div class="stat-value">${totalRevenue.toFixed(2)} €</div></div>
          <div class="stat-card"><div class="stat-label">Affiliés actifs</div><div class="stat-value">${totalAff}</div></div>
          <div class="stat-card"><div class="stat-label">Liens créés</div><div class="stat-value">${totalLinks}</div></div>
        </div>
        <div class="section-card"><div class="section-title">Répartition plateformes</div>${barsHTML}</div>
        <div class="section-card"><div class="section-title">Activité récente</div><div class="activity-list">${recentHTML}</div></div>`;

      document.getElementById('app').innerHTML = buildMobileHeader() + `
        <div class="app-layout">
          ${buildSidebar('overview')}
          <main class="content">${content}</main>
        </div>`;

      setInterval(renderPage, 5000);
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem(ADMIN_SESSION) === '1') showDashboard();
      document.getElementById('admin-password').addEventListener('keydown', e => { if(e.key==='Enter') adminLogin(); });
    });
  </script>
</body>
</html>
