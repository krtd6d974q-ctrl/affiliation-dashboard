<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crush Affi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { margin: 0; background: #0a0a0a; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loader visible immédiatement -->
<div id="loader" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:1.2rem;font-weight:900;color:#8afd3a;letter-spacing:-.5px;font-family:Inter,system-ui,sans-serif">Crush Affi</div>
  <div style="width:32px;height:32px;border:3px solid #222;border-top-color:#8afd3a;border-radius:50%;animation:spin .7s linear infinite"></div>
</div>

<script src="js/data.js"></script>
<script src="js/admin-nav.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', async () => {
    const isAdmin =
      localStorage.getItem(ADMIN_SESSION) === '1' ||
      sessionStorage.getItem(ADMIN_SESSION) === '1';

    if (isAdmin) {
      try {
        await showAdminDashboard();
      } catch(e) {
        console.error(e);
        document.getElementById('loader').innerHTML = `
          <div style="color:#f87171;font-family:Inter,system-ui,sans-serif;text-align:center;padding:24px">
            Erreur de connexion à la base de données.<br>
            <button onclick="location.reload()" style="margin-top:14px;padding:10px 20px;background:#8afd3a;color:#000;border:none;border-radius:10px;font-weight:800;cursor:pointer">Réessayer</button>
          </div>`;
      }
    } else {
      location.replace('pages/affiliate.html');
    }
  });

  async function showAdminDashboard() {
    const [clicks, affs, links] = await Promise.all([
      DB.getClicks(), DB.getAffiliates(), DB.getLinks()
    ]);

    document.getElementById('loader').style.display = 'none';

    const total = Object.values(affs).reduce((s,a) => s + ((a.clicks||0)/1000*5), 0);
    const platforms = {iOS:0, Android:0, PC:0};
    clicks.forEach(c => { if(platforms[c.platform]!==undefined) platforms[c.platform]++; });
    const colors = {iOS:'#6366f1', Android:'#10b981', PC:'#f59e0b'};

    const barsHTML = clicks.length === 0
      ? '<p style="color:var(--text-muted);font-size:.83rem">Aucun clic enregistré</p>'
      : Object.entries(platforms).map(([n,c]) => {
          const pct = Math.round((c/clicks.length)*100);
          return `<div class="platform-row"><span class="platform-name">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[n]}"></div></div><span class="platform-pct">${c} — ${pct}%</span></div>`;
        }).join('');

    const recentHTML = clicks.slice(0,8).map(c => {
      const a = affs[c.affId];
      return `<div class="activity-item"><span class="plat-tag plat-${c.platform.toLowerCase()}">${c.platform}</span><span>${a?a.name:'—'}</span><span class="activity-time">${DB.formatDate(c.ts)}</span></div>`;
    }).join('') || '<p style="color:var(--text-muted);font-size:.83rem;padding:12px 0">Aucune activité</p>';

    renderShell('overview', `
      <p class="page-title">Vue globale</p>
      <p class="page-desc">Temps réel — rafraîchissement automatique</p>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-box-label">Clics totaux</div><div class="stat-box-value accent">${clicks.length.toLocaleString('fr-FR')}</div></div>
        <div class="stat-box"><div class="stat-box-label">Revenus générés</div><div class="stat-box-value green">${total.toFixed(2)} €</div></div>
        <div class="stat-box"><div class="stat-box-label">Affiliés</div><div class="stat-box-value">${Object.keys(affs).length}</div></div>
        <div class="stat-box"><div class="stat-box-label">Liens actifs</div><div class="stat-box-value">${Object.keys(links).length}</div></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Plateformes</span></div>
        <div class="card-body">${barsHTML}</div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Activité récente</span></div>
        <div class="card-body">${recentHTML}</div>
      </div>`);

    setTimeout(() => { DB.invalidate(); showAdminDashboard(); }, 8000);
  }
</script>
</body>
</html>
